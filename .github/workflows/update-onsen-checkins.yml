name: Update Onsen Checkins

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-onsen-checkins:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Foursquare checkins
        env:
          FOURSQUARE_OAUTH_TOKEN: ${{ secrets.FOURSQUARE_OAUTH_TOKEN }}
          FOURSQUARE_CHECKIN_CATEGORY_IDS: ${{ vars.FOURSQUARE_CHECKIN_CATEGORY_IDS || '4bf58dd8d48988d160941735,52e81612bcbc57f1066b7a27,4bf58dd8d48988d1ed941735,58daa1558bbb0b01f18ec1ae' }}
          FOURSQUARE_CHECKIN_LIMIT: '250'
          FOURSQUARE_CHECKIN_MAX_PAGES: '20'
        run: python scripts/fetch_foursquare_checkins.py

      - name: Commit and push changes
        id: commit-changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add astro/data/onsen_places.json astro/data/places.json
          if git diff --cached --quiet; then
            echo "No new checkins"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update Foursquare checkins"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Cloudflare Pages deploy
        if: steps.commit-changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run cloudflare-pages.yml --ref "${GITHUB_REF_NAME:-master}"
