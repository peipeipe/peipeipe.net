name: Update Strava Activities From Export

on:
  workflow_dispatch:
    inputs:
      export_zip_url:
        description: "HTTPS URL to the Strava export ZIP"
        required: true
        type: string
      export_zip_name:
        description: "Local filename to use for the downloaded ZIP"
        required: false
        default: "strava_export.zip"
        type: string

permissions:
  contents: write

jobs:
  update-strava-activities-from-export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Strava export ZIP
        run: |
          curl -fsSL "${{ inputs.export_zip_url }}" -o "$RUNNER_TEMP/${{ inputs.export_zip_name }}"

      - name: Generate Strava activities from export
        run: |
          python scripts/generate_strava_activities_from_export.py "$RUNNER_TEMP/${{ inputs.export_zip_name }}"

      - name: Generate visited mountains
        run: python scripts/generate_visited_mountains.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _data/strava_activities.json _data/visited_mountains.json
          if git diff --cached --exit-code; then
            echo "No new activities"
          else
            git commit -m "Update Strava activities from export"
            git push
          fi
