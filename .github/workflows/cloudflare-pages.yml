name: Deploy Astro to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "astro/**"
      - "astro/content/**"
      - "astro/data/**"
      - "astro/public/**"

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-astro-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_PAGES_PROJECT: peipeipe-net-astro

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: astro/.node-version
          cache: npm
          cache-dependency-path: astro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Verify generated output
        run: |
          test -f dist/index.html
          test -f dist/feed.xml
          test -f dist/sitemap-index.xml
          test -f dist/diary-post/index.html
          test -f dist/nostr.json
          test -f dist/_redirects
          test -f dist/favicon.ico
          test -d dist/images
          npm run check:legacy-slugs

      - name: Set Cloudflare Pages production branch
        if: github.ref_name == 'master'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          curl -fsS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT}" \
            -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --data "{\"name\":\"${CLOUDFLARE_PAGES_PROJECT}\",\"production_branch\":\"master\"}"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist \
            --project-name "${CLOUDFLARE_PAGES_PROJECT}" \
            --branch "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}" \
            --commit-hash "${GITHUB_SHA}" \
            --commit-message "Astro ${GITHUB_REF_NAME} ${GITHUB_SHA}"
