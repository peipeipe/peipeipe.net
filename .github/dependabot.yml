version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/astro"
    target-branch: "master"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "00:32"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 2
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    target-branch: "master"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "00:32"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 2
